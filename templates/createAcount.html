<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css"> 
    <link rel="icon" type="image/x-icon" href="/static/CanyLogo.svg">
    <title>Create Acount</title>
    <style>
        code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }

        .code-4 {
            color : red
        }

        .code-2 {
            color : green
        }
    </style>
</head>
<body>
    <header>
        <a href="/">
            <img src="/static/CanyLogo.svg" alt="logo"/>
        </a>
        <nav>
            <a href="/">Home</a>
            <a href="/connexion"> Connexion</a>
            <a href="/espaceperso"> Espace client </a>
            <a href="/apropos"> Le salon</a>
        </nav>
    </header>
    <main>
        <h1>Créez un compte</h1>
        <form action = "/createAcount" method="post">
            <label>Nom d'utilisateur : <br></label>
            <input type='text' name='user' id='user'> <br>

            <label>Mot de passe : <br></label>
            <input type='text' name='password' id='password'> <br>
            <button type='submit'> envoyer </button>
        </form>
        <p class = "code-{{codeProfile}}" id="msg">{{message}}</p>
    </main>
    <script>
      document.addEventListener('DOMContentLoaded', ()=>{
        const form = document.querySelector('form');
        form.addEventListener('submit', async (ev)=>{
          ev.preventDefault();
          const user = document.getElementById('user').value;
          const password = document.getElementById('password').value;
          try{
            const res = await fetch('/api/users', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user, password}), credentials:'same-origin'});
            const json = await res.json();
            const msgEl = document.getElementById('msg');
            msgEl.textContent = json.message || 'Erreur';
            if(res.ok && json.code === 200){
              msgEl.className = 'code-2';
              form.reset();
            } else {
              msgEl.className = 'code-4';
            }
          }catch(err){console.error(err); alert('Erreur réseau');}
        });
      });
    </script>
</body>
</html>
