<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css"> 
    <link rel="icon" type="image/x-icon" href="/static/CanyLogo.svg">
    <title>Connexion</title>
    <style>
        .code-4 {
            color : red
        }

        .code-2 {
            color : green
        }
    </style>
</head>
    <body>
        <header>
            <a href="/">
                <img src="/static/CanyLogo.svg" alt="logo"/>
            </a>
            <nav>
                <a href="/">Home</a>
                <a href="/connexion"> {{statusHtml}}</a>
                <a href="/espaceperso"> Espace client </a>
                <a href="/apropos"> Le salon</a>
            </nav>
        </header>
        <main>
            <h1>Saisissez vos informations {{test}}</h1>
            <form action = "/fillClientInformation" method="post">
                <label>Prénom : <br></label>
                <input type='text' name='name' id='name'> <br>

                <label>Numero de téléphone :  <br></label>
                <input type='text' name='number' id='number'> <br>
                <button type='submit'> envoyer </button>
            </form>
            <p class = "code-{{codeProfile}}" id="msg">{{message}}</p>
        </main>
        <script>
          document.addEventListener('DOMContentLoaded', ()=>{
            const form = document.querySelector('form');
            form.addEventListener('submit', async (ev)=>{
              ev.preventDefault();
              const name = document.getElementById('name').value;
              const number = document.getElementById('number').value;
              try{
                const res = await fetch('/api/clients', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({name, number}), credentials:'same-origin'});
                const json = await res.json();
                if(res.ok && json.code === 201){
                  window.location.href = '/espaceperso';
                } else {
                  document.getElementById('msg').textContent = json.message || 'Erreur';
                }
              }catch(err){console.error(err); alert('Erreur réseau');}
            });
          });
        </script>
    </body>
</html>
