<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/static/style.css"> 
    <link rel="icon" type="image/x-icon" href="/static/CanyLogo.svg">
    <title>Connexion</title>
    <style>
        .code-4 {
            color : red
        }

        .code-2 {
            color : green
        }

        #creation{
            margin: 0px;
            font-size: 1rem;
        }
    </style>
</head>
    <body>
        <header>
            <a href="/">
                <img src="/static/CanyLogo.svg" alt="logo"/>
            </a>
            <nav>
                <a href="/">Home</a>
                <a href="/connexion"> {{statusHtml}}</a>
                <a href="/espaceperso"> Espace client </a>
                <a href="/apropos"> Le salon</a>
            </nav>
        </header>
        <main>
            <h1>Saisissez vos identifiants</h1> <br>
            <form action = "/connexion" method="post">
                <label>Nom d'utilisateur : <br></label>
                <input type='text' name='user' id='user'> <br>

                <label>Mot de passe : <br></label>
                <input type='text' name='password' id='password'> <br>
                <button type='submit'> envoyer </button>
            </form>
            <p class = "code-{{codeProfile}}">{{message}}</p>
            
            <nav>
                <p><strong>Pas encore de compte ?</strong></p>
                <a href="/createAcount" id="creation">Créer un compte</a>
            </nav>
        </main>
        <script>
          document.addEventListener('DOMContentLoaded', ()=>{
            const form = document.querySelector('form');
            form.addEventListener('submit', async (ev)=>{
              ev.preventDefault();
              const user = document.getElementById('user').value;
              const password = document.getElementById('password').value;
              try{
                const res = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({user, password}), credentials:'same-origin'});
                const json = await res.json();
                if(res.ok && json.code === 201){
                  window.location.href = '/espaceperso';
                } else {
                  document.querySelector('p[class*="code-"]').textContent = json.message || 'Erreur';
                }
              }catch(err){console.error(err); alert('Erreur réseau');}
            });
          });
        </script>
    </body>
</html>
