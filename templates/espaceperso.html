<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Espace client </title>
</head>
<body>

<h1>Bienvenue dans l'espace client !</h1>


<h2>{{text}}</h2>
<p>Nom / Race</p>
{% for dog in dogs %}
<p>{{dog.Nom}} / {{dog.Race}}</p>
{% endfor %}

<h2>Ajouter un chien</h2>
<form method="POST" action="/espaceperso">

    <input type="text" name="nom" placeholder="Nom du chien" required>
    <input type="text" name="race" placeholder="Race" required>
    <button type="submit">Ajouter un toutou ! </button>

</form>
<p class = "code-{{codeProfile}}">{{message}}</p>





<h2> Ajouter une sortie !</h2>
<form method="POST" action="/add-sortie">
    <input type="date" name="date_sortie" placeholder="Date de la sortie" required>
    <select name="chien_id" required> #choisir chien  
         {% for chien in chien %} #on parcourt la liste des chiens encoyés par le serveur
         <option value="{{ chien.id }}">
                {{ chien.nom }}
            </option>
            {% endfor %}
    </select>
    <button type="submit">Ajouter une sortie !</button>

</form>
<p class = "code-{{codeProfile}}">{{message}}</p>
<a href="/">Retour</a>

</body>
</html>
