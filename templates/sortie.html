<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css"> 
    <link rel="icon" type="image/x-icon" href="/static/CanyLogo.svg">
    <title>Ajouter une sortie !</title>
    <style>
        .code-4 {
            color : red
        }

        .code-2 {
            color : green
        }
    </style>
</head>
<body>
        <header>
            <a href="/">
                <img src="/static/CanyLogo.svg" alt="logo"/>
            </a>
            <nav>
                <a href="/">Home</a>
                <a href="/connexion"> {{statusHtml}}</a>
                <a href="/espaceperso"> Espace client </a>
                <a href="/apropos"> Le salon</a>
            </nav>
        </header>
        <main>
            <h2> Ajouter une sortie !</h2>
            <form method="POST" action="/add-sortie">
                <input type="date" name="date_sortie" placeholder="Date de la sortie" required>
                <select name="chien_id" required> #choisir chien 
                    <option value="">-- Choisis ton chien --</option>
                        {% for c in chiens %} 
                            <option value={{c.id}}>
                                {{c.Nom}}
                            </option>
                        {% endfor %}
                    </select>
                <button type="submit">Ajouter une sortie !</button>
            </form>
            <p class = "code-{{codeProfile}}">{{message}}</p>

            <h2> Consulter vos sorties</h2>
            <div id="sortie-list">
              <select id="sortie-select" required>
                <option value="">-- Choisis ta sortie --</option>
                {% for sortie in sorties %} 
                  <option value={{sortie.id}}>
                    {{sortie.Date}}
                  </option>
                {% endfor %}
              </select>
            </div>
        </main>
        <script>
          async function renderSorties(sorties){
            const select = document.getElementById('sortie-select');
            if(!select) return;
            select.innerHTML = '<option value="">-- Choisis ta sortie --</option>';
            if(sorties && sorties.length > 0){
              sorties.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s.id || '';
                opt.textContent = s.Date || '';
                select.appendChild(opt);
              });
            }
          }
          
          async function fetchSorties(){
            try{
              const res = await fetch('/api/sorties', {credentials:'same-origin'});
              if(res.ok){
                const json = await res.json();
                if(json.sorties) renderSorties(json.sorties);
              }
            }catch(e){console.error(e);}
          }
          
          document.addEventListener('DOMContentLoaded', ()=>{
            fetchSorties();
            const form = document.querySelector('form[method="POST"]');
            if(form){
              form.addEventListener('submit', async (ev)=>{
                ev.preventDefault();
                const date = form.querySelector('input[name="date_sortie"]').value;
                const chienId = form.querySelector('select[name="chien_id"]').value;
                try{
                  const res = await fetch('/api/sorties', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({date_sortie:date, chien_id:chienId}), credentials:'same-origin'});
                  const json = await res.json();
                  const msgEl = document.querySelector('p[class*="code-"]');
                  if(msgEl) msgEl.textContent = json.message || 'Erreur';
                  if(res.ok){
                    await fetchSorties();
                    form.reset();
                  }
                }catch(err){console.error(err); alert('Erreur réseau');}
              });
            }
          });
        </script>
    </body>
</html>
